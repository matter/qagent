data:
  provider: yfinance
  db_path: ./data/qagent.duckdb
  models_dir: ./data/models
  factors_dir: ./data/factors
  strategies_dir: ./data/strategies

server:
  host: 127.0.0.1
  port: 8000

backtest:
  default_initial_capital: 1000000
  default_commission_rate: 0.001
  default_slippage_rate: 0.001
  default_benchmark: SPY

market:
  calendar: NYSE

markets:
  US:
    provider: yfinance
    calendar: NYSE
    benchmark: SPY
    default_group: us_all_market
  CN:
    provider: baostock
    calendar: XSHG
    benchmark: sh.000300
    default_group: cn_a_core_indices_union

external_data:
  fred:
    api_key: 4ed1751195b7e31d03b1d94260c2f242
    base_url: https://api.stlouisfed.org/fred
    request_timeout_seconds: 30
